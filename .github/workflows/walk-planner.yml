name: Shiba Walk Planner

on:
  schedule:
    # Evening run (20:00 JST = 11:00 UTC)
    - cron: "0 11 * * *"
    # Morning run (08:00 JST = 23:00 UTC previous day)
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "evening"
        type: choice
        options:
          - evening
          - morning

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
  ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
  LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}

jobs:
  send-walk-plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore weather cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: weather-summary

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 11 * * *" ]; then
            echo "mode=evening" >> "$GITHUB_OUTPUT"
          else
            echo "mode=morning" >> "$GITHUB_OUTPUT"
          fi

      - name: Run walk planner
        run: python -m src.main --mode ${{ steps.mode.outputs.mode }}
