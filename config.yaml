dog:
  name: "Hihi"
  breed: "Shiba Inu"

location:
  city: "Harumi, Chuo-ku, Tokyo"
  lat: 35.6605
  lon: 139.7868

schedule:
  evening_reminder: "20:00"
  morning_reminder: "08:00"

# Walk sessions - add/remove/modify to match your routine
# Each session: name, acceptable time_range, preferred_time, duration_min
walks:
  - name: "midday"
    time_range: ["11:00", "14:00"]
    preferred_time: "12:00"
    duration_min: 30

  - name: "evening"
    time_range: ["19:00", "23:00"]
    preferred_time: "21:00"
    duration_min: 30

# Output language for AI recommendations (zh/en/ja/etc.)
language: "zh"

# API settings - OpenRouter (OpenAI-compatible). Get a key at https://openrouter.ai/keys
# Key via OPENROUTER_API_KEY env var (.env) or uncomment api_key below.
api:
  # api_key: "sk-or-v1-..."  # prefer .env / OPENROUTER_API_KEY env var instead
  base_url: "https://openrouter.ai/api/v1"
  # Primary free model (tried first); falls back to the list below if rate-limited.
  model: "openai/gpt-oss-120b:free"
  fallback_models:
    - "google/gemma-4-31b-it:free"
    - "meta-llama/llama-3.3-70b-instruct:free"
    - "qwen/qwen3-next-80b-a3b-instruct:free"

notifications:
  platform: "line"
  # LINE Messaging API (broadcasts to all friends)
  # line_channel_access_token: "your-channel-access-token"
