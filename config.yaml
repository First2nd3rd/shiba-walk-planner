dog:
  name: "Hihi"
  breed: "Shiba Inu"

location:
  city: "Harumi, Chuo-ku, Tokyo"
  lat: 35.6605
  lon: 139.7868

schedule:
  evening_reminder: "20:00"
  morning_reminder: "07:00"
  timezone: "Asia/Tokyo"

# Walk sessions - add/remove/modify to match your routine
# Each session: name, acceptable time_range, preferred_time, duration_min
walks:
  - name: "midday"
    time_range: ["11:00", "14:00"]
    preferred_time: "12:00"
    duration_min: 30

  - name: "evening"
    time_range: ["17:00", "21:00"]
    preferred_time: "19:00"
    duration_min: 30

# Output language for AI recommendations (zh/en/ja/etc.)
language: "zh"

# API settings - key can also be set via ANTHROPIC_API_KEY env var
api:
  # anthropic_api_key: "sk-..."  # or use .env / env var instead
  anthropic_model: "claude-sonnet-4-5-20250514"

notifications:
  platform: "line"
  # LINE Messaging API (broadcasts to all friends)
  # line_channel_access_token: "your-channel-access-token"
